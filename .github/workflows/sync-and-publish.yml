name: Sync from Upstream & Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Upstream version to sync (e.g., v4.11.1)'
        required: false
        type: string

jobs:
  sync-and-publish:
    name: Sync upstream & publish @stanco323/oh-my-claude-code
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Yeachan-Heo/oh-my-claudecode.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Check latest upstream version
        id: upstream_version
        run: |
          if [ -n "${{ inputs.upstream_version }}" ]; then
            VERSION="${{ inputs.upstream_version }}"
          else
            VERSION=$(git tag --list 'upstream/v*' --sort=-v:refname | head -n1 | sed 's/upstream\///')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found upstream version: $VERSION"

      - name: Check if version already published
        id: check_version
        run: |
          if npm view @stanco323/oh-my-claude-code@${VERSION#v} version &>/dev/null; then
            echo "ALREADY_PUBLISHED=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published on npm"
          else
            echo "ALREADY_PUBLISHED=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream tag into main
        run: |
          git checkout main
          git merge --no-edit "upstream/${VERSION}" || {
            # If merge fails (already merged or nothing to merge), that's fine
            echo "Merge result: $?"
          }
        env:
          VERSION: ${{ steps.upstream_version.outputs.VERSION }}

      - name: Check for actual changes to publish
        id: changes_check
        run: |
          # Check if there are any differences from upstream that need publishing
          if [ "${{ steps.check_version.outputs.ALREADY_PUBLISHED }}" == "true" ]; then
            # Even if version exists on npm, check if content changed
            # by comparing the merged content hash against what npm has
            PKG_HASH=$(npm pack --dry-run 2>/dev/null | grep "package name" || echo "unknown")
            echo "Package content check for already-published version"
            # If ALREADY_PUBLISHED and merge had no conflicts/fast-forward,
            # we still need to rebuild to verify tests pass
            echo "CHANGES_TO_PUBLISH=true" >> $GITHUB_OUTPUT
          else
            echo "CHANGES_TO_PUBLISH=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Publish to npm (@stanco323) via OIDC
        if: steps.check_version.outputs.ALREADY_PUBLISHED == 'false'
        run: npm publish --access public --ignore-scripts

      - name: Push synced main
        run: |
          # Check if there are any commits to push
          git push origin main || echo "Nothing to push or push failed"