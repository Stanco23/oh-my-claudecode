name: Sync from Upstream & Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Upstream version to sync (e.g., v4.11.1)'
        required: false
        type: string

jobs:
  sync-and-publish:
    name: Sync upstream & publish @stanco323/oh-my-claude-code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Yeachan-Heo/oh-my-claudecode

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Merge upstream main
        run: |
          git checkout main
          git fetch upstream main
          git merge --no-edit upstream/main || {
            echo "Merge had conflicts or nothing to merge - that's fine"
          }

      - name: Get our package version
        id: our_version
        run: |
          # Use our own package.json version (not upstream's tag)
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Our package version: $VERSION"

      - name: Check if our version already published
        id: check_version
        run: |
          VERSION="${{ steps.our_version.outputs.VERSION }}"
          if npm view @stanco323/oh-my-claude-code@$VERSION version &>/dev/null; then
            echo "ALREADY_PUBLISHED=true" >> $GITHUB_OUTPUT
            echo "Our version $VERSION already published on npm"
          else
            echo "ALREADY_PUBLISHED=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Publish to npm (@stanco323)
        if: steps.check_version.outputs.ALREADY_PUBLISHED == 'false'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts

      - name: Push synced main
        run: |
          git push origin main
