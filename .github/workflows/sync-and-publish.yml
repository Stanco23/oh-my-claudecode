name: Sync from Upstream & Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Upstream version to sync (e.g., v4.11.1)'
        required: false
        type: string

jobs:
  sync-and-publish:
    name: Sync upstream & publish @stanco323/oh-my-claude-code
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Yeachan-Heo/oh-my-claudecode.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Check latest upstream version
        id: upstream_version
        run: |
          if [ -n "${{ inputs.upstream_version }}" ]; then
            VERSION="${{ inputs.upstream_version }}"
          else
            # Upstream uses "v4.11.0" format, not "upstream/v4.11.0"
            VERSION=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found upstream version: $VERSION"

      - name: Check if version already published
        id: check_version
        run: |
          VERSION_NUM="${VERSION#v}"
          if npm view @stanco323/oh-my-claude-code@$VERSION_NUM version &>/dev/null; then
            echo "ALREADY_PUBLISHED=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published on npm"
          else
            echo "ALREADY_PUBLISHED=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream tag into main
        run: |
          git checkout main
          git fetch upstream main
          # Merge upstream/main (not a specific tag) to capture all changes
          git merge --no-edit upstream/main || {
            echo "Merge had conflicts or nothing to merge - that's fine"
          }
        env:
          VERSION: ${{ steps.upstream_version.outputs.VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Publish to npm (@stanco323) via OIDC
        if: steps.check_version.outputs.ALREADY_PUBLISHED == 'false'
        run: npm publish --access public --ignore-scripts

      - name: Push synced main
        run: |
          # Push if there are changes
          git push origin main